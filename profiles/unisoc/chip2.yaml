  size: 0x00001000
  offset_in_dump: 0x1E400000
- name: phycp_iram
  start_addr: 0x00000000
  size: 0x00002000
  offset_in_dump: 0x1E401000
- name: phycp_llram
  start_addr: 0x41000000
  size: 0x00040000
  offset_in_dump: 0x1E403000
plugins:
- rtos.threadx.threadx_v6p5p1
display:
  scheme: cli_basic
  options:
    show_hex: true
    show_address: true
    max_rows: 50
keyword:
- _tx_thread_created_ptr