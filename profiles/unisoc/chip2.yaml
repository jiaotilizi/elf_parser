  vendor: unisoc
  description: Unisoc chip2 (dwarffi parser)
  arch: armv7-r
  cpu: cortex-r8
  bits: 32
parser: dwarffi
memory:
- name: share_memory
  start_addr: 0x88000000
  size: 0x1E400000
