chip:
  name: qemu_r52_threadx
  vendor: qemu
  description: QEMU mps3-an536 (Cortex-R52) + ThreadX v6.5.1
  arch: armv8-r
  cpu: cortex-r52
  bits: 32
qemu:
  binary: qemu-system-arm
  machine: mps3-an536
  cpu: cortex-r52
  kernel_arg: -kernel
  ram_base: 536870912
  ram_size: 4194304
  run_seconds: 3.0
  wait_symbol: dump_ready
memory:
- name: ram
  start_addr: 536870912
  size: 4194304
  offset_in_dump: 0
plugins:
- rtos.threadx.threadx_v6p5p1
- module.assert_info.assert_info_v0
- module.test_point.test_point_v0
display:
  scheme: cli_basic
  options:
    show_hex: true
    show_address: true
    max_rows: 50
keyword:
- _tx_thread_created_ptr
- thread_
