chip:
  name: qemu_mps3_an536_freertos
  vendor: arm
  description: QEMU ARM MPS3 AN536 (Cortex-R52) + FreeRTOS v11.3.0
  arch: armv8-r
  cpu: cortex-r52
  bits: 32
qemu:
  binary: qemu-system-arm
  machine: mps3-an536
  cpu: cortex-r52
  kernel_arg: -kernel
  ram_base: 536870912
  ram_size: 4194304
  run_seconds: 3.0
memory:
- name: ram
  start_addr: 536870912
  size: 4194304
  offset_in_dump: 0
plugins:
- rtos.freertos.freertos_v11p3p0
- module.assert_info.assert_info_v0
- module.test_point.test_point_v0
display:
  scheme: cli_basic
  options:
    show_hex: true
    show_address: true
    max_rows: 50
keyword:
- pxReadyTasksLists
- thread_
