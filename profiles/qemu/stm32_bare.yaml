chip:
  name: qemu_stm32_bare
  vendor: stm
  description: QEMU STM32VLDISCOVERY (Cortex-M3) bare metal
  arch: armv7-m
  cpu: cortex-m3
  bits: 32
qemu:
  binary: qemu-system-arm
  machine: stm32vldiscovery
  cpu: cortex-m3
  kernel_arg: -kernel
  ram_base: 536870912
  ram_size: 20480
  run_seconds: 2.0
memory:
- name: ram
  start_addr: 536870912
  size: 20480
  offset_in_dump: 0
plugins:
- module.assert_info.assert_info_v0
- module.test_point.test_point_v0
display:
  scheme: cli_table
  options:
    show_hex: true
    show_address: true
    max_rows: 50
keyword:
- g_system_ticks
- test_points
- trace_buffer
- stm32
