chip:
  name: qemu_arm_virt_a53_bare
  vendor: arm
  description: QEMU ARM virt Cortex-A53 bare-metal (AArch64)
  arch: armv8-a
  cpu: cortex-a53
  bits: 64
qemu:
  binary: qemu-system-aarch64
  machine: virt
  cpu: cortex-a53
  kernel_arg: -kernel
  ram_base: 1073741824
  ram_size: 16384
  run_seconds: 2.0
memory:
- name: ram
  start_addr: 1073741824
  size: 16384
display:
  scheme: cli_basic
  options:
    show_hex: true
plugins: []
