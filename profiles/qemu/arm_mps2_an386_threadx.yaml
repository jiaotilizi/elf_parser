chip:
  name: qemu_arm_mps2_an386_threadx
  vendor: arm
  description: QEMU ARM MPS2 AN386 (Cortex-M4) + ThreadX v6.5.1
  arch: armv7e-m
  cpu: cortex-m4
  bits: 32
qemu:
  binary: qemu-system-arm
  machine: mps2-an386
  cpu: cortex-m4
  kernel_arg: -kernel
  ram_base: 536870912
  ram_size: 65536
  run_seconds: 3.0
memory:
- name: ram
  start_addr: 536870912
  size: 65536
  offset_in_dump: 0
plugins:
- rtos.threadx.threadx_v6p5p1
- module.assert_info.assert_info_v0
- module.test_point.test_point_v0
display:
  scheme: cli_table
  options:
    show_hex: true
    show_address: true
    max_rows: 50
keyword:
- _tx_thread_created_ptr
- _tx_mutex_created_ptr
- _tx_semaphore_created_ptr
- thread_
