chip:
  name: qemu_m4_bare
  vendor: qemu
  description: QEMU mps2-an386 Cortex-M4 bare-metal
  arch: armv7e-m
  cpu: cortex-m4
  bits: 32
os:
  name: baremetal
  description: Bare-metal firmware on QEMU
qemu:
  binary: qemu-system-arm
  machine: mps2-an386
  cpu: cortex-m4
  kernel_arg: -kernel
  ram_base: 0x20000000
  ram_size: 4096
  run_seconds: 2.0
memory:
- name: ram
  start_addr: 536870912
  size: 4096
modules:
- assert_info
- test_point