chip:
  name: qemu_aarch64_bare
  vendor: qemu
  description: QEMU virt Cortex-A53 bare-metal (AArch64)
  arch: armv8-a
  cpu: cortex-a53
  bits: 64
os:
  name: baremetal
  description: Bare-metal firmware on QEMU (AArch64)
qemu:
  binary: qemu-system-aarch64
  machine: virt
  cpu: cortex-a53
  kernel_arg: -kernel
  ram_base: 0x40000000
  ram_size: 16384
  run_seconds: 2.0
memory:
- name: ram
  start_addr: 1073741824
  size: 16384
modules:
- assert_info
- test_point
display:
  scheme: cli_basic
  options:
    show_hex: true