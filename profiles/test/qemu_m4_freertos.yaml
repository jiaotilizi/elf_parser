chip:
  name: qemu_m4_freertos
  vendor: qemu
  description: QEMU mps2-an386 (Cortex-M4) + FreeRTOS V11.3.0
  arch: armv7e-m
  cpu: cortex-m4
  bits: 32
os:
  name: freertos
  version: v11p3p0
  description: FreeRTOS v11p3p0 on QEMU Cortex-M4 with 4 tasks + mutex/sem/queue/eventgroup
qemu:
  binary: qemu-system-arm
  machine: mps2-an386
  cpu: cortex-m4
  kernel_arg: -kernel
  ram_base: 0x20000000
  ram_size: 65536
  run_seconds: 3.0
memory:
- name: ram
  start_addr: 536870912   # 0x20000000
  size: 65536             # 64KB
modules:
- assert_info
- test_point
plugins:
- rtos/freertos
display:
  scheme: cli_interactive
  options:
    show_hex: true
    show_address: true
    max_rows: 50