chip:
  name: qemu_r52_threadx
  vendor: qemu
  description: QEMU mps3-an536 (Cortex-R52) + ThreadX v6.5.1
  arch: armv8-r
  cpu: cortex-r52
  bits: 32
os:
  name: threadx
  version: v6p5p1
  description: ThreadX v6p5p1 on QEMU Cortex-R52 with 10 threads + mutex/sem/queue/eventflags
qemu:
  binary: qemu-system-arm
  machine: mps3-an536
  cpu: cortex-r52
  kernel_arg: -kernel
  ram_base: 0x20000000
  ram_size: 4194304
  run_seconds: 3.0
memory:
- name: ram
  start_addr: 0x20000000
  size: 4194304
  offset_in_dump: 0
modules:
- assert_info
- test_point
plugins:
- rtos/threadx
display:
  scheme: cli_basic
  options:
    show_hex: true
    show_address: true
    max_rows: 50