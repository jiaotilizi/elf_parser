chip:
  name: qemu_m4_threadx
  vendor: qemu
  description: QEMU mps2-an386 (Cortex-M4) + ThreadX v6.5.1
  arch: armv7e-m
  cpu: cortex-m4
  bits: 32
os:
  name: threadx
  version: v6p5p1
  description: ThreadX v6p5p1 on QEMU Cortex-M4 with 8 threads + mutex/sem/queue/eventflags
qemu:
  binary: qemu-system-arm
  machine: mps2-an386
  cpu: cortex-m4
  kernel_arg: -kernel
  ram_base: 0x20000000
  ram_size: 65536
  run_seconds: 3.0
memory:
- name: flash
  start_addr: 0x08000000  # Flash start
  size: 262144            # 256KB Flash
  offset_in_dump: 0       # Flash data at beginning of dump
- name: ram
  start_addr: 0x20000000  # RAM start
  size: 65536             # 64KB RAM
  offset_in_dump: 262144  # RAM data after Flash section
modules:
- assert_info
- test_point
plugins:
- rtos/threadx
display:
  scheme: cli_interactive
  options:
    show_hex: true
    show_address: true
    max_rows: 50