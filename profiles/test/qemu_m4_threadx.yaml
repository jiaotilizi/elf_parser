chip:
  name: qemu_m4_threadx
  vendor: qemu
  description: QEMU mps2-an386 (Cortex-M4) + ThreadX v6.5.1
  arch: armv7e-m
  cpu: cortex-m4
  bits: 32
os:
  name: threadx_v6p5p1
  description: ThreadX v6p5p1 on QEMU Cortex-M4 with 8 threads + mutex/sem/queue/eventflags
qemu:
  binary: qemu-system-arm
  machine: mps2-an386
  cpu: cortex-m4
  kernel_arg: -kernel
  ram_base: 0x20000000
  ram_size: 65536
  run_seconds: 3.0
memory:
- name: ram
  start_addr: 536870912   # 0x20000000
  size: 65536             # 64KB
modules:
- assert_info
- test_point
plugins:
- rtos/threadx